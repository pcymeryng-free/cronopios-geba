<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cronopios GEBA</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">

    <div class="logo-container">

      <img src="logo.jpeg" alt="Logo Cronopios" class="logo"/>

      <h1>Cronopios GEBA 2026</h1>

  </div>

    <p class="subtitle">
      Completá la encuesta
    </p>

    <form id="cronopiosForm">

      <label>Nombre</label>

      <select id="jugador" required>

        <option value="">Seleccionar</option>

        <optgroup label="Caballeros">
          <option>Bruno Nicolotti</option>
          <option>Matias Gallego</option>
          <option>Santi Brusco</option>
          <option>Coqui</option>
          <option>Marco Trombetta</option>
          <option>Santino</option>
          <option>Diego Putallaz</option>
          <option>Martin Zuccardi</option>
          <option>Gustavo Brusco</option>
          <option>Pablo Cymeryng</option>
        </optgroup>

        <optgroup label="Damas">
          <option>Yami</option>
          <option>Yani</option>
          <option>Analia</option>
          <option>Sandra Forcher</option>
          <option>Gaby</option>
          <option>Dolores</option>
          <option>Mayra</option>
          <option>Florencia Riom</option>
        </optgroup>

      </select>

      <label>1- ¿De qué lado preferís jugar?</label>

      <select id="lado" required>
        <option value="">Seleccionar</option>
        <option>Derecha</option>
        <option>Izquierda</option>
      </select>

      <label>2- ¿Cómo preferís jugar?</label>

      <select id="estilo" required>
        <option value="">Seleccionar</option>
        <option>De fondo</option>
        <option>En la red</option>
      </select>

      <div id="mismoGenero"></div>

      <div id="dmSection"></div>

      <button type="submit">
        Enviar respuestas
      </button>

    </form>

    <div id="mensaje"></div>

  </div>

  <script src="script.js"></script>

</body>
</html>
