    </p>

    <form id="cronopiosForm">

      <label>Nombre</label>

      <select id="jugador" required>
        <option value="">Seleccionar</option>

        <optgroup label="Caballeros">
          <option value="Bruno Nicolotti">Bruno Nicolotti</option>
          <option value="Matias Gallego">Matias Gallego</option>
          <option value="Santi Brusco">Santi Brusco</option>
          <option value="Coqui">Coqui</option>
          <option value="Marco Trombetta">Marco Trombetta</option>
          <option value="Santino">Santino</option>
          <option value="Diego Putallaz">Diego Putallaz</option>
          <option value="Martin Zuccardi">Martin Zuccardi</option>
          <option value="Gustavo Brusco">Gustavo Brusco</option>
          <option value="Pablo Cymeryng">Pablo Cymeryng</option>
        </optgroup>

        <optgroup label="Damas">
          <option value="Yami">Yami</option>
          <option value="Yani">Yani</option>
          <option value="Analia">Analia</option>
          <option value="Sandra Forcher">Sandra Forcher</option>
          <option value="Gaby">Gaby</option>
          <option value="Dolores">Dolores</option>
          <option value="Mayra">Mayra</option>
          <option value="Florencia Riom">Florencia Riom</option>
        </optgroup>

      </select>

      <label>1- ¿De qué lado preferís jugar?</label>

      <select id="lado" required>
        <option value="">Seleccionar</option>
        <option>Derecha</option>
        <option>Izquierda</option>
      </select>

      <label>2- ¿Qué preferís jugar?</label>

      <select id="estilo" required>
        <option value="">Seleccionar</option>
        <option>De fondo</option>
        <option>En la red</option>
      </select>

      <div id="mismoGenero"></div>

      <div id="dmSection"></div>

      <button type="submit">Enviar respuestas</button>

    </form>

    <div id="mensaje"></div>

  </div>
